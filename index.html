<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AskJeev</title>
<link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="app">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="title">AskJeev</div>
    <div class="subtitle">Your AI system</div>
  </header>

  <!-- CHAT AREA -->
  <main id="chat" class="chat">

    <div class="bot message">
      Hey 👋 I’m AskJeev. Ask me anything.
    </div>

  </main>

  <!-- INPUT -->
  <div class="inputBar">
    <input id="input" placeholder="Message AskJeev..." />
    <button onclick="send()">➤</button>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottomNav">
    <div class="navItem active">Chat</div>
    <div class="navItem">Projects</div>
    <div class="navItem">Memory</div>
    <div class="navItem">Settings</div>
  </nav>

</div>

<script src="script.js"></script>
</body>
</html>
