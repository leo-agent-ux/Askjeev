<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AskJeev</title>
<link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">AskJeev</div>
    <div class="tag">AI Operating System</div>

    <div class="nav">
      <div class="item active">💬 Chat</div>
      <div class="item">📂 Projects</div>
      <div class="item">🧠 Memory</div>
      <div class="item">🌍 Research</div>
      <div class="item">📁 Files</div>
      <div class="item">⚙️ Settings</div>
    </div>

    <div class="footer">v1 • Ultra UI Build</div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <header class="topbar">
      <h1>AskJeev</h1>
      <p>Faster than search. Smarter than chat. Gets things done.</p>
    </header>

    <section id="chat" class="chat">

      <div class="bot message animate">
        Hello 👋 I’m AskJeev. What would you like to build, learn, or solve today?
      </div>

    </section>

    <!-- INPUT -->
    <div class="inputWrap">
      <input id="input" placeholder="Message AskJeev..." />
      <button onclick="send()">➤</button>
    </div>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
